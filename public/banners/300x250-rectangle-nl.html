<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Rectangle NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 300px; height: 250px;
      background: linear-gradient(180deg, #2aa348 0%, #1e7d38 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden; border-radius: 12px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.2);
    }
    .banner img {
      width: 120px; height: 90px; object-fit: cover; border-radius: 8px;
      animation: walk 3.5s ease-in-out infinite;
    }
    @keyframes walk {
      0%, 100% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
    }
    .text { color: white; text-align: center; margin-top: 15px; }
    .text h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .text p { font-size: 12px; opacity: 0.95; }
    .cta {
      background: #E67A4C; color: white; padding: 8px 18px;
      border-radius: 8px; font-weight: 700; font-size: 12px;
      text-decoration: none; display: inline-block; margin-top: 12px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-wheelchair-small.webp" alt="Rolstoelhond">
    <div class="text">
      <h2>€100 = Eén rolstoel</h2>
      <p>Eén hond die weer kan rennen</p>
      <span class="cta">DONEER →</span>
    </div>
  </a>
</body>
</html>
