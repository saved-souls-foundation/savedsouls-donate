<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Mobile NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 320px; height: 50px;
      background: linear-gradient(90deg, #2aa348 0%, #1e7d38 100%);
      display: flex; align-items: center; gap: 12px; padding: 0 15px;
      overflow: hidden; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
    }
    .banner img {
      height: 38px; width: 50px; object-fit: cover; border-radius: 6px;
      animation: walk 2.5s ease-in-out infinite;
    }
    @keyframes walk {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(8px); }
    }
    .text { color: white; flex: 1; }
    .text span { font-size: 14px; font-weight: 700; }
    .cta {
      background: #E67A4C; color: white; padding: 6px 12px;
      border-radius: 6px; font-weight: 700; font-size: 11px;
      text-decoration: none; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.com" target="_blank" class="banner">
    <img src="/dog-wheelchair-small.webp" alt="Rolstoelhond">
    <div class="text"><span>Financier een rolstoel • €100</span></div>
    <span class="cta">DONEER</span>
  </a>
</body>
</html>
