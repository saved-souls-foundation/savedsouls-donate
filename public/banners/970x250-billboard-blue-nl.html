<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Billboard NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 970px; height: 250px;
      background: linear-gradient(120deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);
      display: flex; align-items: center; gap: 40px; padding: 0 50px;
      overflow: hidden; border-radius: 12px; box-shadow: 0 8px 30px rgba(30,64,175,0.4);
    }
    .banner img { height: 200px; border-radius: 12px; flex-shrink: 0; object-fit: cover; }
    .text { color: white; flex: 1; }
    .text h2 { font-size: 36px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
    .text p { font-size: 18px; opacity: 0.95; margin-bottom: 20px; }
    .cta {
      background: #f59e0b; color: white; padding: 14px 32px;
      border-radius: 10px; font-weight: 700; font-size: 18px;
      text-decoration: none; display: inline-block;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/team-dogs.webp" alt="Asielhonden bij Saved Souls" width="300" height="200">
    <div class="text">
      <h2>Asielhonden & katten hebben jou nodig</h2>
      <p>430 honden. 91 katten. Khon Kaen, Thailand. Red • Adopteer • Sponsor</p>
      <span class="cta">DONEER NU →</span>
    </div>
  </a>
</body>
</html>
