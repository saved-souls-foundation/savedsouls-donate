<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Full Banner NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 468px; height: 60px;
      background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%);
      display: flex; align-items: center; gap: 15px; padding: 0 20px;
      overflow: hidden; border-radius: 8px; box-shadow: 0 4px 20px rgba(30,64,175,0.4);
    }
    .banner img { height: 45px; width: 60px; object-fit: cover; border-radius: 6px; }
    .text { color: white; flex: 1; }
    .text h2 { font-size: 18px; font-weight: 800; }
    .cta {
      background: #f59e0b; color: white; padding: 8px 18px;
      border-radius: 8px; font-weight: 700; font-size: 13px;
      text-decoration: none; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-sand-happy.webp" alt="Asielhonden">
    <div class="text"><h2>Saved Souls • Asielhonden & katten • Thailand</h2></div>
    <span class="cta">DONEER</span>
  </a>
</body>
</html>
