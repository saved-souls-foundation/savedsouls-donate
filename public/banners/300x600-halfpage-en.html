<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Half Page EN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 300px; height: 600px;
      background: linear-gradient(180deg, #2aa348 0%, #1e7d38 40%, #0d9488 100%);
      display: flex; flex-direction: column; align-items: center; padding: 35px 25px;
      overflow: hidden; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }
    .banner img {
      width: 200px; height: 150px; object-fit: cover; border-radius: 12px;
      animation: walk 4.5s ease-in-out infinite;
    }
    @keyframes walk {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(40px); }
    }
    .text { color: white; text-align: center; margin-top: 30px; }
    .text h2 { font-size: 22px; font-weight: 900; margin-bottom: 12px; line-height: 1.3; }
    .text p { font-size: 14px; opacity: 0.95; margin-bottom: 20px; }
    .cta {
      background: #E67A4C; color: white; padding: 14px 28px;
      border-radius: 12px; font-weight: 700; font-size: 16px;
      text-decoration: none; display: inline-block;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(230,122,76,0.5); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/woman-dog-wheelchair.webp" alt="Wheelchair dog at Saved Souls">
    <div class="text">
      <h2>Paralyzed Dogs Deserve Wheelchairs, Not Euthanasia</h2>
      <p>Khon Kaen, Thailand. 430 dogs. We never say no.</p>
      <span class="cta">ADOPT • SPONSOR →</span>
    </div>
  </a>
</body>
</html>
