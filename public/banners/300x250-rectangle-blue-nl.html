<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Rectangle NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 300px; height: 250px;
      background: linear-gradient(180deg, #1e40af 0%, #3b82f6 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden; border-radius: 12px;
      box-shadow: 0 6px 25px rgba(30,64,175,0.4);
    }
    .banner img { width: 100px; height: 80px; object-fit: cover; border-radius: 8px; }
    .text { color: white; text-align: center; margin-top: 15px; }
    .text h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .text p { font-size: 12px; opacity: 0.95; }
    .cta {
      background: #f59e0b; color: white; padding: 8px 18px;
      border-radius: 8px; font-weight: 700; font-size: 12px;
      text-decoration: none; display: inline-block; margin-top: 12px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-care.webp" alt="Asielhonden en katten">
    <div class="text">
      <h2>Asielhonden & katten</h2>
      <p>Khon Kaen, Thailand</p>
      <span class="cta">DONEER →</span>
    </div>
  </a>
</body>
</html>
