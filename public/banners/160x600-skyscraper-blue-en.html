<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Skyscraper EN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 160px; height: 600px;
      background: linear-gradient(180deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);
      display: flex; flex-direction: column; align-items: center; padding: 25px 15px;
      overflow: hidden; border-radius: 12px; box-shadow: 0 8px 30px rgba(30,64,175,0.4);
    }
    .banner img { width: 130px; height: 100px; object-fit: cover; border-radius: 8px; }
    .text { color: white; text-align: center; margin-top: 20px; }
    .text h2 { font-size: 16px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .text p { font-size: 11px; opacity: 0.95; }
    .cta {
      background: #f59e0b; color: white; padding: 10px 16px;
      border-radius: 8px; font-weight: 700; font-size: 12px;
      text-decoration: none; display: inline-block; margin-top: 25px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/two-dogs-platform.webp" alt="Shelter dogs">
    <div class="text">
      <h2>Saved Souls Foundation</h2>
      <p>Shelter dogs & cats in Thailand. Donate • Adopt • Sponsor</p>
      <span class="cta">HELP NOW →</span>
    </div>
  </a>
</body>
</html>
