<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Round NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 200px; height: 200px;
      background: radial-gradient(circle at 30% 30%, #2aa348, #1e7d38);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden; border-radius: 50%;
      box-shadow: 0 6px 25px rgba(0,0,0,0.25);
    }
    .banner img {
      width: 70px; height: 55px; object-fit: cover; border-radius: 50%;
      animation: walk 2.8s ease-in-out infinite;
    }
    @keyframes walk {
      0%, 100% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
    }
    .text { color: white; text-align: center; margin-top: 12px; }
    .text h2 { font-size: 13px; font-weight: 800; }
    .cta {
      background: #E67A4C; color: white; padding: 6px 14px;
      border-radius: 20px; font-weight: 700; font-size: 10px;
      text-decoration: none; display: inline-block; margin-top: 10px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-wheelchair-small.webp" alt="Rolstoelhond">
    <div class="text">
      <h2>Saved Souls</h2>
      <span class="cta">DONEER</span>
    </div>
  </a>
</body>
</html>
