<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Leaderboard NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 728px; height: 90px;
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; overflow: hidden;
      border-radius: 8px; box-shadow: 0 4px 20px rgba(30,64,175,0.4);
    }
    .banner img { height: 70px; border-radius: 8px; }
    .text { color: white; text-align: right; }
    .text h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .text p { font-size: 14px; opacity: 0.95; }
    .cta {
      background: #f59e0b; color: white; padding: 10px 20px;
      border-radius: 8px; font-weight: 700; font-size: 14px;
      text-decoration: none; display: inline-block; margin-top: 6px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/woman-hug-dog.webp" alt="Asielhonden">
    <div class="text">
      <h2>Asielhonden & katten</h2>
      <p>430 honden • 91 katten • Khon Kaen, Thailand</p>
      <span class="cta">DONEER • ADOPTEER →</span>
    </div>
  </a>
</body>
</html>
