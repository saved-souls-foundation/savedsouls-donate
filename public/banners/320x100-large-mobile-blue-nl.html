<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Large Mobile NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 320px; height: 100px;
      background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%);
      display: flex; align-items: center; gap: 12px; padding: 0 14px;
      overflow: hidden; border-radius: 10px; box-shadow: 0 6px 25px rgba(30,64,175,0.4);
    }
    .banner img { height: 60px; width: 70px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .text { color: white; flex: 1; min-width: 0; }
    .text h2 { font-size: 16px; font-weight: 800; margin-bottom: 2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .text p { font-size: 11px; opacity: 0.95; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cta {
      background: #f59e0b; color: white; padding: 8px 16px;
      border-radius: 8px; font-weight: 700; font-size: 13px;
      text-decoration: none; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-sand-happy.webp" alt="Asielhonden">
    <div class="text">
      <h2>Asielhonden & katten</h2>
      <p>430 honden • 91 katten • Thailand</p>
    </div>
    <span class="cta">DONEER</span>
  </a>
</body>
</html>
