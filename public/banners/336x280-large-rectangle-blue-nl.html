<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Large Rectangle NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 336px; height: 280px;
      background: linear-gradient(160deg, #1e40af 0%, #0ea5e9 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 25px; overflow: hidden; border-radius: 14px;
      box-shadow: 0 8px 35px rgba(30,64,175,0.4);
    }
    .banner img { width: 140px; height: 105px; object-fit: cover; border-radius: 10px; }
    .text { color: white; text-align: center; margin-top: 20px; }
    .text h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .text p { font-size: 13px; opacity: 0.95; }
    .cta {
      background: #f59e0b; color: white; padding: 10px 24px;
      border-radius: 10px; font-weight: 700; font-size: 14px;
      text-decoration: none; display: inline-block; margin-top: 15px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.06); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/volunteer-hero.png" alt="Asielhonden en katten">
    <div class="text">
      <h2>Asielhonden & katten</h2>
      <p>430 honden • 91 katten • Khon Kaen, Thailand</p>
      <span class="cta">DONEER • ADOPTEER →</span>
    </div>
  </a>
</body>
</html>
