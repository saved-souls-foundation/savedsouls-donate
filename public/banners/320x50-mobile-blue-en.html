<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Mobile EN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 320px; height: 50px;
      background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%);
      display: flex; align-items: center; gap: 12px; padding: 0 15px;
      overflow: hidden; border-radius: 8px; box-shadow: 0 2px 15px rgba(30,64,175,0.4);
    }
    .banner img { height: 38px; width: 50px; object-fit: cover; border-radius: 6px; }
    .text { color: white; flex: 1; }
    .text span { font-size: 14px; font-weight: 700; }
    .cta {
      background: #f59e0b; color: white; padding: 6px 12px;
      border-radius: 6px; font-weight: 700; font-size: 11px;
      text-decoration: none; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/cat-feed.png" alt="Shelter dogs and cats">
    <div class="text"><span>Shelter dogs & cats • Thailand</span></div>
    <span class="cta">DONATE</span>
  </a>
</body>
</html>
