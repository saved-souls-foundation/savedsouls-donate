<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Blue Square NL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 250px; height: 250px;
      background: linear-gradient(145deg, #1e40af 0%, #0ea5e9 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 25px; overflow: hidden; border-radius: 16px;
      box-shadow: 0 8px 30px rgba(30,64,175,0.4);
    }
    .banner img { width: 100px; height: 80px; object-fit: cover; border-radius: 12px; }
    .text { color: white; text-align: center; margin-top: 18px; }
    .text h2 { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .text p { font-size: 11px; opacity: 0.95; }
    .cta {
      background: #f59e0b; color: white; padding: 8px 20px;
      border-radius: 10px; font-weight: 700; font-size: 12px;
      text-decoration: none; display: inline-block; margin-top: 12px;
      transition: transform 0.2s;
    }
    .cta:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <a href="https://www.savedsouls-foundation.com" target="_blank" class="banner">
    <img src="/hero-hug.png" alt="Asielhonden en katten">
    <div class="text">
      <h2>Asielhonden & katten</h2>
      <p>Thailand • Doneer • Adopteer</p>
      <span class="cta">HELP →</span>
    </div>
  </a>
</body>
</html>
