<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Souls - Large Rectangle EN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }
    .banner {
      width: 336px; height: 280px;
      background: linear-gradient(160deg, #2aa348 0%, #0d9488 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 25px; overflow: hidden; border-radius: 14px;
      box-shadow: 0 8px 35px rgba(0,0,0,0.25);
    }
    .banner img {
      width: 140px; height: 105px; object-fit: cover; border-radius: 10px;
      animation: walk 3.8s ease-in-out infinite;
    }
    @keyframes walk {
      0%, 100% { transform: translateX(-25px); }
      50% { transform: translateX(25px); }
    }
    .text { color: white; text-align: center; margin-top: 20px; }
    .text h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .text p { font-size: 13px; opacity: 0.95; }
    .cta {
      background: #E67A4C; color: white; padding: 10px 24px;
      border-radius: 10px; font-weight: 700; font-size: 14px;
      text-decoration: none; display: inline-block; margin-top: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover { transform: scale(1.06); box-shadow: 0 4px 15px rgba(230,122,76,0.5); }
  </style>
</head>
<body>
  <a href="https://savedsouls-foundation.org" target="_blank" class="banner">
    <img src="/dog-wheelchair-small.webp" alt="Wheelchair dog">
    <div class="text">
      <h2>Every Dog Deserves a Second Chance</h2>
      <p>Fund a wheelchair for €100 • Khon Kaen, Thailand</p>
      <span class="cta">DONATE NOW →</span>
    </div>
  </a>
</body>
</html>
